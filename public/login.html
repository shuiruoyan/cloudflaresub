<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 优选IP订阅生成器</title>
    <link rel="icon" href="/icons/auto.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .login-wrap {
        max-width: 440px;
        margin: 18vh auto 0;
      }
      .login-wrap .card {
        padding: 32px;
      }
      .login-wrap h1 {
        font-size: 1.5rem;
        margin-bottom: 8px;
      }
      .login-wrap .lead {
        color: var(--muted);
        margin-bottom: 24px;
        font-size: 0.95rem;
      }
      .login-wrap input[type="password"] {
        margin-bottom: 18px;
      }
      .login-wrap button {
        width: 100%;
      }
      .login-error {
        color: var(--danger);
        font-size: 0.92rem;
        margin-top: 12px;
        line-height: 1.6;
      }
      .login-wrap .hero-logo {
        width: 1.1em;
        height: 1.1em;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="login-wrap">
        <div class="card">
          <p class="eyebrow">Access Control</p>
          <h1 class="hero-title">
            <img src="/icons/auto.svg" alt="logo" class="hero-logo" />
            <span>访问验证</span>
          </h1>
          <p class="lead">请输入访问令牌以继续使用订阅生成器。</p>
          <form id="login-form">
            <label for="token">访问令牌</label>
            <input id="token" type="password" placeholder="输入 SUB_ACCESS_TOKEN" required />
            <button type="submit" id="loginBtn">验证并进入</button>
            <div id="errorBox" class="login-error hidden"></div>
          </form>
        </div>
      </div>
    </main>
    <script>
      const TOKEN_KEY = 'sub_access_token';
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        location.href = '/?t=' + encodeURIComponent(token);
      }

      const form = document.getElementById('login-form');
      const btn = document.getElementById('loginBtn');
      const errorBox = document.getElementById('errorBox');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.classList.add('hidden');
        btn.disabled = true;
        btn.textContent = '验证中...';

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ token: document.getElementById('token').value }),
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || '验证失败');

          localStorage.setItem(TOKEN_KEY, document.getElementById('token').value);
          location.href = '/?t=' + encodeURIComponent(document.getElementById('token').value);
        } catch (err) {
          errorBox.textContent = err.message;
          errorBox.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = '验证并进入';
        }
      });
    </script>
  </body>
</html>
